# --- DataSource -------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/auditdb
spring.datasource.username=audit
spring.datasource.password=audit
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA --------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Flyway -----------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# If the DB was created outside Flyway (no schema history table), treat V1 as the
# baseline so that V1's DDL is skipped (audit_events already exists) and V2+ are applied.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# --- Audit retention --------------------------------------------------------------
# Number of days to keep events in the hot table before archival
audit.retention.days=90
# Cron: every day at 02:00 UTC
audit.retention.cron=0 0 2 * * *

# --- Web --------------------------------------------------------------------------
spring.mvc.pathmatch.use-suffix-pattern=false