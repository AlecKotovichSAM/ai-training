name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # ───── setup (not counted as a pipeline step) ─────
      - uses: actions/checkout@v4

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      # ─────────────────────────────────────────────
      # ✅ STEP 1 — Build
      # ─────────────────────────────────────────────
      - name: Build (compile)
        run: ./mvnw -B compile

      # ─────────────────────────────────────────────
      # ✅ STEP 2 — Spotless
      # ─────────────────────────────────────────────
      - name: Spotless check
        run: ./mvnw -B spotless:check

      # ─────────────────────────────────────────────
      # ✅ STEP 3 — Tests (excluding ArchUnit)
      # ─────────────────────────────────────────────
      - name: Run tests (excluding ArchUnit)
        run: ./mvnw -B test -DexcludedGroups=arch

      # ─────────────────────────────────────────────
      # ✅ STEP 4 — ArchUnit
      # ─────────────────────────────────────────────
      - name: Run ArchUnit tests
        run: ./mvnw -B test -Dgroups=arch -DfailIfNoTests=true
